services:
  redis:
    image: redis:latest
    container_name: url-shortener-redis
    ports:
      - "8765:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: url-shortener-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped

volumes:
  redis-data:
  mongodb-data:
