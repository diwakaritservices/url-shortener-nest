services:
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "8765:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/url-shortener
      REDIS_URL: redis://redis:6379
      SHORT_URL_CACHE_TTL_SECONDS: ${SHORT_URL_CACHE_TTL_SECONDS:-43200}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:?TURNSTILE_SECRET_KEY is required}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:8080}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SKIP_SEND: ${SMTP_SKIP_SEND:-true}
      EMAIL_VERIFICATION_SKIP: ${EMAIL_VERIFICATION_SKIP:-false}
      EMAIL_VERIFICATION_OTP_TTL_SECONDS: ${EMAIL_VERIFICATION_OTP_TTL_SECONDS:-600}
      EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS: ${EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:-60}
      EMAIL_VERIFICATION_MAX_RESENDS: ${EMAIL_VERIFICATION_MAX_RESENDS:-5}
      EMAIL_VERIFICATION_RESEND_WINDOW_SECONDS: ${EMAIL_VERIFICATION_RESEND_WINDOW_SECONDS:-3600}
      PASSWORD_RESET_OTP_TTL_SECONDS: ${PASSWORD_RESET_OTP_TTL_SECONDS:-600}
      SECURITY_CONTACT_EMAIL: ${SECURITY_CONTACT_EMAIL:-}
      ADMIN_NOTIFY_EMAIL: ${ADMIN_NOTIFY_EMAIL:-hello@diwakarit.com}
      ADMIN_NOTIFY_ENABLED: ${ADMIN_NOTIFY_ENABLED:-true}
      NOTIFY_QUEUE_CONCURRENCY: ${NOTIFY_QUEUE_CONCURRENCY:-5}
      DOMAIN_EVENTS_STREAM: ${DOMAIN_EVENTS_STREAM:-domain-events}
      DOMAIN_EVENTS_DLQ_STREAM: ${DOMAIN_EVENTS_DLQ_STREAM:-domain-events-dlq}
      DOMAIN_EVENTS_MAX_LEN: ${DOMAIN_EVENTS_MAX_LEN:-10000}
      STREAM_BLOCK_MS: ${STREAM_BLOCK_MS:-5000}
      STREAM_CLAIM_IDLE_MS: ${STREAM_CLAIM_IDLE_MS:-30000}
      STREAM_RECLAIM_INTERVAL_MS: ${STREAM_RECLAIM_INTERVAL_MS:-15000}
      STREAM_MAX_DELIVERIES: ${STREAM_MAX_DELIVERIES:-3}
    expose:
      - "3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
        VITE_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:?TURNSTILE_SITE_KEY is required}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  mongodb-data:
  redis-data:
